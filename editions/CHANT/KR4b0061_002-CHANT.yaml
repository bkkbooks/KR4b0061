body:
  text: 卷二歎別賦在羈旅兮為思每居常而不樂意難偕於駘蕩情易邀於隕穫愁非和而自來憂試排而不卻退求己以自省慨撫衿而太息位不俟於一進髮徒彰於二色名有似於務耕學無均於譬織在初歸之為慶庶因拙而自收保私庭之宴喜共昆弟而嬉遊校小文於搖筆比楷式於臨流止每歡於接膝行如喜於同輈忽一去而數千遂離居而別域阻同被於當寐乖共湌於終食唯憑遠望以代歸負相思其無力藝文類聚三十初學記十八為臨川王解司空表臣以庸薄謬竊隆重職班三事任揔六條衣袞坐槐既闕論道馳傳憩棠尤慚為政而俯司土地仰燮陰陽棟撓之譏已彰愆伏之咎爰著今水沴乃作旱魃為災山無薈蔚雲成煙火陛下曲私未垂策免臣職是當於何逃責乞降茲台步協此天人藝文類聚四十七御覽二百八為安成王讓江州表臣聞失晨之雞雖不忘於改旦敗駕之馬終取忸於銜鑣臣昔牧淮岱皇風咫尺一變至道易以為政而亂政莫理美錦徒傷豈可復宣六條闡化千里又臣聞六轡沃若不策玄黃之馬九成輪奐無求擁腫之材何則蹐跼之路已窮梁棟之用斯闕竝藝文類聚五十為南平王讓徐州表竊以淮岱務殷事乖坐嘯枌榆望重非可臥治臣緜頓枕席動移旬晦恆恐尺波易流寸陰難保寍可復冒此寵應茲恩榮藝文類聚五十為臨川王解揚州表臣自馳傳斗牛作牧淮海政刑兩空璿璣六運既昧弛張之要尤慚大小之獄故以結詠濡翼取愧能官每一進思無忘退食誠復恩私可憑而彝倫難紊敢恃慈弘冒披心款乞解州任少弭素湌為鄱陽嗣王初讓雍州表臣大邦維屏既慚宗子之詩思樂泮宮有缺僖公之頌特以周開元伯錫壤參墟漢啟三倕分珪舊楚身私家慶總集微躬擁部襟帶跨制數州西距嶢關南踰鄧塞雖復呼韓來朝稾街納質二虜尋戈四郊無警猶如王戎雅識羊祜尚義臣求諸己無或宴安進思盡忠歸乎犯謁藝文類聚五十為李揚州舅讓表人心彼此盡為敵國金柝夜警和門晝閉加以淮水淼漫危同三坂懷山之勢已成為魚之期可見若使身死可以益國城沒足用報恩雖葬魚鼈其甘如薺政以朽耄無庸心負恩寄恥辱之甚非止老臣藝文類聚五十為晉安王讓丹陽尹表臣聞盈尺徑寸易取琢磨南箕北斗難為簸挹何則良工質美在器成珍假名責實涉求必殆藝文類聚五十為雍州柳津請留刺史晉安王表楚備寶臣秦兵不入齊多君子魏珠恥昭足使文公懼而側席孟軻歎而廢寢敢言借寇之願切望申耿之恩陛下昔在潛龍因茲或躍固以陋膴膴於周原包怱怱之佳氣昔次君出撫近駕班輪喬卿在政遙授袞服焉馮熊軾而督盜御龍章而行部無虧燮理有光司牧藝文類聚五十二為江僕射禮薦士表階下緝禮裁樂化俗移風當扆思治分宵夢相枯岸之珠既掄潤山之玉已薦伏見兼太學博士會稽賀瑒字德璉幼能斧藻長則琢磨結卷就賢擔簦來學鄉塾染其丹采朋友扣其洪鍾聲無愧於東筠材有踰乎西杞如使聯事宗伯握蘭建禮庶用得其才人知自勗臣鑒非止水職豫搜揚前竭謏聞先自鄉曲為江侍中薦士表臣聞天道不言資寒暑而成歲宸居垂拱寄守宰以宣風若夜魚不欺朝琴在奏則殘殺自去汾射可追伏見鎮北府水曹參軍濟陽江興字休恭立身貞白操業清廉頗涉書記彌閑刀筆前攝縣沮漳無傷錦製巡行淮海不忝繡衣若處以百里之邑使導一鄉之賦必能治文無害迄用有成臣舉不避族非欲異姓居後知人為難寔緣所悉而薦藝文類聚五十三為臨川王奉詔班師表臣自受服廟堂申威塞表既驅熊羆之眾兼稟帷幄之謀登濟河山夷滅趙魏將繫軹道之頸且屈渭橋之膝而玄陰屆節祁寒方始降此慈弘愍茲介冑使燕然之石願勒而不刊函谷之土將封而莫遂雖荷杕杜之恩終慚采薇之旨藝文類聚五十九為始興王上毛龜表臣聞嘉瑞五靈既著方策故名千載可得而傳是以玄蔡赤文來表軒黃之政神龜青純用顯姬公之德出自江安寔荷謙夷之慶甲生毳羽寍非銷謫之徵實皇家之巨瑞庶民之休幸蓺文類聚九十九彈賈執傅湛文梁大同中長兼御史中丞劉孝儀稽首言南康嗣王府行參軍知譜事賈執與前中書舍人傅湛在王座飲酒時上不安人從臺還聖體已和湛乃揚眉瞋目謂執曰卿念天子我不見闕出悖慢言語連及於上共執忿諍湛昔經殺牛誤父自殺近效殘貪賄賂狼藉特逢解網宥其餘命自被棄廢尤懷怨憤謗訕不遜謹按前兼通事舍人臣傅湛才薄駑蹇特荷抽擢自預左右頻蹈極刑押對鞠書累逢闕過未聞報效反懷恚憤聖體不安臣下憂懼而湛敢生怨望輕肆慢辭醜爭及父心無愛敬戲語連上罪同悖逆未央馬瘦不覩廄令之忠甘泉道蕪遽見扶風之罪宜其徇乎東市尸彼轂門南康嗣王府參軍臣賈執始間湛語初無逐雀之心末因私忿遂顯懷鴆之逆雖跡似折奸意由肆憾惡慢於人自彰穢醜見辱父子已會季倫之辭爭及其父復入梁蚡之難是使王嬙悲於連累黑要喜於得用太子舍人始興蕃王臣蕭毅幸因祉祚爵預藩屏而散金失所設醴乖人雍容之賓未遊於雕苑號怒之容日醉於雷池致使博徒跅弛慢醉盈路靦顏受辱會無發糾並恕伯厚之心俱鳴路粹之責臣等參議請以見事依法免毅所居官解執知譜事請議貶黜付之卿論不得廁預官流刺尚施行輒不禁止文苑英華六百四十九從弟喪上東宮啟從弟喪上東宮啟亡從弟遵百行無點千里立志同氣三荊之友假寢十起之慈皆體之於自然行之如俛拾自碣宮陪宴釣臺從幸攀附鱗翼三十餘載茫昧與善一旦長辭劍匿光芒璧碎符采躬搖神筆親動妙思雖每想南皮書憶阮瑀行經北館歌悼子侯不足輩此深仁齊茲舊愛藝文類聚二十一為王儀同謝國姻啟即日主書王靜民宣敕安吉主降嬪臣第三息實臣素里庸族蓬衡賤品事隔伊緡之禮望絕下嫁之姬而聖慈猥洽皇姻曲建荊布陋飾已膺凡獎負薪微胤復降肅邕頻煩叨荷內外榮抃藝文類聚四十謝東宮賜五色藤筌蹄一枚啟炎州采藤麗窮綺縟謝女出門宮賜紋絹燭啟謝女出門宮賜紋絹燭啟孝儀啟左右袁文成奉宣旨宜知臣私營發遣垂賜紋絹二十疋燭二十挺臣家本貧敝事多蹇闕桓室金縷本非所宜孟姬作具猶若未周殊澤曲臨珍華兼重制為美服雙綺易儔秉而不息三夜有待臣名品卑末事隔榮賜慈渥之墜實見因心小人微賤豈能勝報不忘初學記二十五除建康令謝啟所恐長安少年易為操彈渭城游徼矜其獨勇清路道奴固知難慴輕綏飛駕且見為榮藝文類聚五十為晉安王謝東宮賜玉環刀啟苗鋒珍鋌利極鉤芒謹當擁以雄身藉而安體不令北海小雍孤擅穿滕之寄廬江佩刀獨表不欺之驗藝文類聚六十御覽三百四十六為王儀同謝宅啟昔晏嬰湫隘齊景營其爽塏孫歷無家晉武為之築館或功高千載德重一時故蒙考室之榮以降葺宇之澤並辭而處傳芳前載臣才愧昔人恩同往哲豈宜妄荷重增疵𠫤但匈奴未滅遽當輪奐之美環堵為室遂得歌哭於斯為武陵王謝賜第啟竊以南望朱鳥北距蒼龍右帶御溝左迴青路畢晏嬰之湫隘同潘岳之閑居臣幼自宮掖長遊城府雖輪奐之美多門而館第之私未暇今輕舟將反高門遽錫遂葺家築室百堵皆興雲屋連甍一朝弘敞藝文類聚六十四謝晉安王賜銀裝絲帶啟雕鏤新奇織製精絜越中玉女不得關思上方名匠莫能議巧人情駭觀如見買臣之綬望貌移姿似逢子訓之術藝文類聚六十七謝始興王賜花紈簟啟麗兼桃象周洽昏明便覺夏室已寒冬裘可襲雖九日煎沙香粉猶棄三旬沸海團扇可捐藝文類聚六十九謝東宮賚酒啟異五齊之甘非九醞之法屬車未曾載油囊不得酤試儔仙樹葛玄泥首才比蒲桃孟他銜璧固知託之養性妙解怡神擬彼聖人羞得連類藝文類聚七十二謝晉安王賜宜城酒啟孝儀啟奉教垂賜宜城酒四器歲暮不聊在陰即慘於斯二理總萃一時少府鬭猴莫能致笑大夫落雉不足解顏忽值瓶瀉淑芳壺開玉液漢樽莫過殷杯未逢方平醉而遁仙羲和耽而廢職仰憑殊途便申私飲未矚罍恥已觀幘岸傾耳求音不聞霆擊澄神密眂豈覿山高愈疾消憂於斯已驗遺榮忽賤即事不欺酩酊之中猶知銘荷不任謹啟事初學記二十六謝晉安王賚蝦醬啟龍醬傳甘退成可陋蚳醢稱貴追覺失言上聖聞雷未之能覆嘉賓流歠羞無辭窶藝文類聚七十二御覽八百六十五謝鄱陽王賜鉢啟謝鄱陽王賜鉢啟珍窮貨貢製極範金用貴寶樽文包龍鼎雕鏤海籍圖載山經閱眾靈於器中弄神姦於掌裏足令任后所欲遠慚漢世少君有覿遙荒齊寢藝文類聚七十三謝東宮賜城傍橘啟謝東宮賜城傍橘啟多置守民晉為厚秩坐入縑素漢譬封君固以俛疋穰橙俯連楚柚寍似魏瓜借清泉而得冷豈如蜀食待飴蜜而成甜重似倒影陽池垂華金堞信可珍若榴於式乾貴蒲萄於別館藝文類聚八十六謝晉安王賜甘啟謝晉安王賜甘啟便得削彼金衣咽茲玉液甘踰萍實冷亞冰壺立消煩䬼頓除酩酊追嗤齊相進不剖之實遠笑魏君逢裂牙之味藝文類聚八十六初學記二十八謝始興王賜柰啟酒泉之實稱於王賦瓜州之味記自張文亦有太沖嗟其夏成子建畼其寒熟潘園曜白孫井浮朱并見重於昔時而霑恩於茲日藝文類聚八十六為晉安王謝賜鵝鴨啟形類沈文經符陶記晉臣羞筮吳覡未占復有背如車蓋胸垂卻月口疑犀𣡩腳似魚懸出九芝之池去千金之沼藝文類聚九十一謝豫章王賜馬啟出自北冀來從東道儛越兩驂驅同八駿循坂且厲無復良樂之鳴長楸可走不假幽并之策藝文類聚九十三謝始興王賜車牛啟下官安於躡屩習以成性乘堅驅駿未可厝心慈渥無涯每垂獎飾無復難載之朋將申共弊之美濯龍望水未足儔光長門聽雷不能均響謝豫章王賜牛啟觀其毛角相合骨像應圖曳流水而生光騖高限其如接遂使上阜輟駕下澤是驅馮軾修途既獲坐馳之致馴豢廣庭方念載憂之勗藝文類聚九十四北使還與永豐侯蕭撝書北使還與永豐侯蕭撝書足踐寒地身犯朔風暮宿客亭晨炊謁舍飄颻辛苦迄屆氈鄉雜種覃化頗慕中國兵傳李緒之法樓擬衛律所治而毳幙難淹酪漿易饜王程有限時及玉關射鹿胡奴乃共歸國刻龍漢節還持入塞馬銜苜蓿嘶立故墟人獲蒲萄歸種舊里稚子出迎善鄰相勞倦握蟹螯亟覆蝦盌未改朱顏略多自醉用此終日亦以自娛藝文類聚五十三初學記二十御覽七百七十九探物作豔體連珠妾聞洛妃高髻不姿於芳澤玄妻長髮無籍於金鈿故雲名由於自美蟬稱得於天然是以梁妻獨其妖豔衛姬專其可憐妾聞芳性深情雖欲忘而不歇薰芬動慮事逾久而更思是以津亭掩馥秖結秦婦之恨爵臺餘妬追生魏妾之悲藝文類聚五十七文苑英華七百七十一平等寺剎下銘平等寺剎下銘香薪已燎花疊盡然頻果絕其軟言綿毫收其廣照紺鉢遺采託慕所依紅爪餘暉申悲是寄因使金表爭構玉剎競脩豈止天界飾其四園龍宮陳其七寶樹似菴林峰疑鷲色孕吐仙霧涌瀨靈泉燕室緣雲精廬切漢制兼祕殿采美御房羲和假道於罘罳翔鸞迴翼於飛棟建章厭勝未及雕礱甘泉避暑豈窮輪奐檻綴玫瑰階填粟玉絡以如意飾用沈檀火齊勝明燭銀颺采釋梵奪其身光日車貶其輪照辭曰惟茲寶塔妙跡可傳盤稱鄴境樓美湆川雙龍虛繞九鳳徒懸豈如神剎耿介淩煙珠含魄月幡垂淨天寶鐸夜響銀地朝鮮檐棲迥霧砌卷香蓮翻蠡下梵墜鶴歸仙恒沙擾擾世界綿綿踐茲勝影袪彼蓋纏藝文類聚七十七雍州金像寺無量壽佛像碑昔堯乃則天莫能名其聖丘纔譬日無德稱其道況復欲宣五品將歎三法固使迦葉恥其無智龍樹羞其非辯猶聞獻蓋長者頌以七言無學比丘陳其百句至有九輩性生一身補處塵洗玉池神聞金葉樹聲繁會趙簡於是未聞地寶焜煌周穆之所不見昔者出城石轉還林現疾夢樹既沈梵花獨反猶有香杖疊衣紅爪紺髮可得崇以妙利顯用珍函彼彌陁感化殊攝日輪照曜月面從容毫散珠輝脣開異色似含微笑俱注目於瞻仰如出軟言咸傾耳於諦聽像復以其夕出住寺門始則映顯巖閒猶對鷲山之禮末又徘徊閫外似救毗城之疾空中生樹豈曰難思火內披蓮未為多有銘曰奄有淨國寶應多祉葉產梵童花開釋子玉蓮交映銀荷遞起伊尹慚桑伯陽羞李藝文類聚七十六

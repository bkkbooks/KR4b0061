body:
  text: 卷一從軍行冠軍親挾射長平自合圍木落雕弓燥氣秋征鴈肥賢王皆屈膝幕府復申威何謂從軍樂往返速如飛類聚五十九作劉孝義文苑英華百九十九樂府詩集三十二作劉孝儀詩紀八十七和昭明太子鍾山解講詔樂臨東序時駕出西園雖窮理遊盛終為塵俗喧豈如弘七覺揚鸞啓四門夜氣清簫管曉陳爍郊原山風亂采眊初景麗文轅林開前騎騁徑曲羽旄屯煙壁浮青翠石瀨響飛奔回輿下重閣降道訪真源談空匹泉涌綴藻邁弦繁輕生逢遇誤竝作輩龍鵷顧已同偏爵何用挹衢樽廣弘明集三十詩紀八十七又類聚七十六引園喧門原轅屯奔源繁鵷十韻和簡文帝賽漢高廟和簡文帝賽漢高廟圭幣崇明祀牲樽禮貴神風驚如集廟光至似來陳徘徊靈駕入叫咷倡歌新將言非為己致敬乃祈民多才與多事今古獨為鄰類聚七十九詩紀八十七行過康王故第苑行過康王故第苑入梁逢故苑度薛見餘宮尚識招賢閣猶懷愛士風靈光一超遠衡館亦蒙籠洞門餘舊色甘棠留故叢送禽悲不去過客慕難窮池竹徒如在林堂曖已空遠橋隔樹出迥澗隱岸通芳流小山桂塵起大王風具物咸如此是地感余衷空想陵前劍徒悲壟上童劉孝威集作過康王第宅文苑英華三百七作過康王第宅詩紀八十七又初學記十引宮風籠叢窮空通風衷九韻閨怨本無金屋寵長作玉階悲一乖西北麗寧復城南期永巷愁無歇應門閉有時空勞織素巧徒為團扇詞匡床終不共何由橫自私類聚三十二詩紀八十七帆渡吉陽洲揚帆乘浪華操鼓要風力近樹倏而遐遙山俄已逼欲比驚龍掣將頓陽烏翼客行悲道遠唯須前路極類聚二十七文苑英華二百八十九作帆渡吉陽州詩紀八十七詠簫危聲合鼓吹絶弄混笙篪管饒知氣促叉動覺唇移簫史安為貴能令秦女隨類聚四十四初學記十六文苑英華二百十二作劉孝綽注云一作儀詩紀八十七詠織女詠織女金鈿已照曜白日未蹉跎欲待黃昏後含嬌渡淺河玉臺新詠十類聚四及初學記四作劉孝威古今歲時雜詠二十五御覽三十一萬花谷後四作劉孝儀詩詩紀八十七詠石蓮蓮名堪百萬石姓重千金不解無情物那得似人心玉臺新詠十詩紀八十七和詠舞回履裾香散飄衫鈿響傳低叉依促管曼睇入繁絃類聚四十三作和舞詩初學記十五萬花谷後三十二作劉孝儀詩詩紀八十七又和轉袖隨歌發頓履赴絃餘度行過接手回身乍斂裾類聚四十三詩紀八十七舞就行依歌移弱步傍燭豔新粧徐來翻應節亂去反成行類聚四十三初學記十五萬花谷後三十二詩紀八十七
